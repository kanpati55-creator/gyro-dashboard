<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gyro Dash">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<title>Gyro Car Dashboard</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #141926;
    --line: #2a3247;
    --text: #e8ecf5;
    --dim: #8b94a8;
    --accent: #33d17a;
    --warn: #f6c445;
    --danger: #f2545b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif;
    overscroll-behavior: none;
    touch-action: manipulation;
  }
  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: max(12px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
    gap: 10px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.08em; color: var(--dim); }
  #status { font-size: 12px; color: var(--dim); }
  #status.ok { color: var(--accent); }

  .grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1.1fr 1fr;
    gap: 10px;
    min-height: 0;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .panel .label {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: #c3cbdd;
    margin-bottom: 6px;
  }
  .value { font-variant-numeric: tabular-nums; font-weight: 700; }
  .value .unit { font-size: 0.45em; font-weight: 500; color: var(--dim); margin-left: 2px; }

  #speedPanel { grid-column: 1 / -1; }
  #speedVal { font-size: clamp(48px, 16vw, 84px); line-height: 1; }

  canvas { width: 100%; height: 100%; display: block; }
  .canvasWrap { width: 100%; flex: 1; min-height: 0; position: relative; }
  .readout {
    display: flex;
    gap: 14px;
    margin-top: 6px;
    font-size: 13px;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
  }
  .readout b { color: var(--text); font-weight: 600; }

  #altPanel .value { font-size: clamp(26px, 8vw, 40px); }

  /* start overlay */
  #overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    padding: 24px;
    text-align: center;
    z-index: 10;
  }
  #overlay h2 { font-size: 22px; }
  #overlay p { color: var(--dim); font-size: 14px; line-height: 1.7; max-width: 30em; }
  #startBtn {
    font-size: 18px;
    font-weight: 700;
    color: #06210f;
    background: var(--accent);
    border: none;
    border-radius: 999px;
    padding: 16px 48px;
    cursor: pointer;
  }
  #startBtn:active { transform: scale(0.97); }
  #err { color: var(--danger); font-size: 13px; min-height: 1.2em; }
  #calBtn {
    background: var(--accent);
    border: none;
    color: #06210f;
    font-weight: 700;
    border-radius: 999px;
    padding: 12px 28px;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
  }
  #calBtn:active { transform: scale(0.96); }
</style>
</head>
<body>

<div id="overlay">
  <h2>🚗 Gyro Car Dashboard</h2>
  <p>
    iPhoneをクルマのダッシュボードに固定して使う計器アプリです。<br>
    ジャイロで<b>傾斜計（左右・前後）</b>、加速度センサーで<b>Gメーター</b>、
    GPSで<b>速度</b>と<b>方位</b>を表示します。<br><br>
    ⚠️ 運転中は画面を注視しないでください。設定・キャリブレーションは必ず停車中に行ってください。
  </p>
  <button id="startBtn">START</button>
  <div id="err"></div>
</div>

<div id="app">
  <header>
    <h1>GYRO DASHBOARD</h1>
    <div id="status">sensors: —</div>
  </header>

  <div class="grid">
    <div class="panel" id="speedPanel">
      <div class="label">速度</div>
      <div class="value" id="speedVal">--<span class="unit">km/h</span></div>
    </div>

    <div class="panel" id="tiltPanel">
      <div class="label">傾斜計</div>
      <div class="canvasWrap"><canvas id="tilt"></canvas></div>
    </div>

    <div class="panel" id="gPanel">
      <div class="label">G-FORCE</div>
      <div class="canvasWrap"><canvas id="gball"></canvas></div>
      <div class="readout">
        <span>MAX <b id="gMax">0.00G</b></span>
      </div>
    </div>

    <div class="panel" id="compassPanel">
      <div class="label">コンパス</div>
      <div class="canvasWrap"><canvas id="compass"></canvas></div>
    </div>

    <div class="panel" id="altPanel">
      <div class="label">標高</div>
      <div class="value" id="altVal">--<span class="unit">m</span></div>
      <button id="calBtn">水平リセット</button>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const $ = (id) => document.getElementById(id);
  const overlay = $("overlay"), errEl = $("err"), statusEl = $("status");

  // ---- state ----
  const state = {
    roll: 0, pitch: 0,          // degrees (calibrated)
    rollRaw: 0, pitchRaw: 0,    // degrees (raw)
    rollZero: 0, pitchZero: 0,  // calibration offsets
    gx: 0, gy: 0,               // lateral / longitudinal G (smoothed)
    gMax: 0,
    grav: { x: 0, y: -9.8, z: 0 }, // low-passed gravity vector (upright default)
    speed: null,                // km/h
    heading: null,              // degrees
    alt: null,                  // meters
  };

  const DIRS = ["北","北北東","北東","東北東","東","東南東","南東","南南東",
                "南","南南西","南西","西南西","西","西北西","北西","北北西"];

  // ---- sensors ----
  function onOrientation(e) {
    // Tilt comes from the gravity vector in onMotion — Euler angles (beta/gamma)
    // blow up near the upright-portrait pose this app is mounted in.
    if (e.webkitCompassHeading !== undefined && !Number.isNaN(e.webkitCompassHeading)) {
      state.heading = e.webkitCompassHeading;
    } else if (e.absolute && e.alpha !== null) {
      state.heading = (360 - e.alpha) % 360;
    }
  }

  function onMotion(e) {
    const G = 9.80665, k = 0.15; // low-pass filter
    const a = e.acceleration;
    if (a && a.x !== null) {
      // Portrait mount: x = lateral, z(toward driver) = longitudinal.
      // Screen-up on the G ball = direction of travel (accel up, braking down).
      state.gx = state.gx + k * ((a.x / G) - state.gx);
      state.gy = state.gy + k * ((a.z / G) - state.gy);
      const mag = Math.hypot(state.gx, state.gy);
      if (mag > state.gMax) state.gMax = mag;
    }

    // Tilt from the gravity vector — stable at any mounting angle, unlike
    // beta/gamma which have a singularity when the phone stands upright.
    // Subtracting the fused user-acceleration keeps braking/accelerating on a
    // flat road from reading as a slope.
    const gi = e.accelerationIncludingGravity;
    if (gi && gi.x !== null) {
      const hasA = a && a.x !== null;
      const kg = 0.08, gr = state.grav;
      gr.x += kg * ((gi.x - (hasA ? a.x : 0)) - gr.x);
      gr.y += kg * ((gi.y - (hasA ? a.y : 0)) - gr.y);
      gr.z += kg * ((gi.z - (hasA ? a.z : 0)) - gr.z);
      const m = Math.hypot(gr.x, gr.y, gr.z) || 1;
      // iOS reports the gravity direction, the W3C spec its reaction — the
      // sign of y (down the standing phone) tells which convention is live.
      const f = gr.y < 0 ? 1 : -1;
      const R2D = 180 / Math.PI;
      const clamp1 = (v) => Math.max(-1, Math.min(1, v));
      state.rollRaw = f * Math.asin(clamp1(gr.x / m)) * R2D;
      state.pitchRaw = -f * Math.asin(clamp1(gr.z / m)) * R2D;
      state.roll = state.rollRaw - state.rollZero;
      state.pitch = state.pitchRaw - state.pitchZero;
    }
  }

  function startGeolocation() {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition(
      (pos) => {
        state.speed = pos.coords.speed !== null ? pos.coords.speed * 3.6 : null;
        state.alt = pos.coords.altitude;
        if (state.heading === null && pos.coords.heading !== null && !Number.isNaN(pos.coords.heading)) {
          state.heading = pos.coords.heading;
        }
      },
      () => { /* GPS unavailable — leave speed blank */ },
      { enableHighAccuracy: true, maximumAge: 500, timeout: 10000 }
    );
  }

  async function requestSensorPermission() {
    // iOS 13+ requires an explicit permission request from a user gesture.
    if (typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function") {
      const m = await DeviceMotionEvent.requestPermission();
      if (m !== "granted") throw new Error("モーションセンサーの利用が許可されませんでした");
    }
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
      const o = await DeviceOrientationEvent.requestPermission();
      if (o !== "granted") throw new Error("ジャイロの利用が許可されませんでした");
    }
    window.addEventListener("deviceorientation", onOrientation);
    window.addEventListener("devicemotion", onMotion);
  }

  // ---- canvas helpers ----
  function fitCanvas(canvas) {
    const dpr = window.devicePixelRatio || 1;
    const r = canvas.parentElement.getBoundingClientRect();
    canvas.width = Math.max(1, r.width * dpr);
    canvas.height = Math.max(1, r.height * dpr);
    return dpr;
  }

  function rr(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function tiltColor(deg) {
    const a = Math.abs(deg);
    return a >= 20 ? "#f2545b" : a >= 10 ? "#f6c445" : "#33d17a";
  }

  const tiltC = $("tilt"), gballC = $("gball"), compassC = $("compass");

  // ---- tilt gauge (car icons) ----
  function carRear(ctx, u, color) {
    // wheels
    ctx.fillStyle = "#1c2130";
    rr(ctx, -u * 0.44, u * 0.10, u * 0.18, u * 0.16, u * 0.05); ctx.fill();
    rr(ctx,  u * 0.26, u * 0.10, u * 0.18, u * 0.16, u * 0.05); ctx.fill();
    // body
    ctx.fillStyle = color;
    rr(ctx, -u * 0.5, -u * 0.10, u, u * 0.28, u * 0.07); ctx.fill();
    // cabin
    rr(ctx, -u * 0.32, -u * 0.34, u * 0.64, u * 0.28, u * 0.09); ctx.fill();
    // rear window
    ctx.fillStyle = "#0b0e14";
    rr(ctx, -u * 0.25, -u * 0.29, u * 0.5, u * 0.16, u * 0.05); ctx.fill();
  }

  function carSide(ctx, u, color) {
    // wheels
    ctx.fillStyle = "#1c2130";
    ctx.beginPath(); ctx.arc(-u * 0.28, u * 0.14, u * 0.11, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( u * 0.30, u * 0.14, u * 0.11, 0, Math.PI * 2); ctx.fill();
    // body (front = right)
    ctx.fillStyle = color;
    rr(ctx, -u * 0.5, -u * 0.08, u, u * 0.22, u * 0.07); ctx.fill();
    // cabin
    ctx.beginPath();
    ctx.moveTo(-u * 0.30, -u * 0.08);
    ctx.lineTo(-u * 0.24, -u * 0.30);
    ctx.lineTo( u * 0.14, -u * 0.30);
    ctx.lineTo( u * 0.26, -u * 0.08);
    ctx.closePath(); ctx.fill();
    // window
    ctx.fillStyle = "#0b0e14";
    ctx.beginPath();
    ctx.moveTo(-u * 0.22, -u * 0.10);
    ctx.lineTo(-u * 0.18, -u * 0.26);
    ctx.lineTo( u * 0.10, -u * 0.26);
    ctx.lineTo( u * 0.19, -u * 0.10);
    ctx.closePath(); ctx.fill();
  }

  function drawTiltHalf(ctx, dpr, x, y, w, h, deg, mode) {
    const cx = x + w / 2, cy = y + h * 0.58;
    const u = Math.min(w, h * 1.3) * 0.62;
    const clamped = Math.max(-45, Math.min(45, deg));
    // roll: right side down = clockwise. pitch: uphill = front (right) up = counterclockwise.
    const shown = mode === "roll" ? clamped : -clamped;
    const color = tiltColor(deg);

    // dashed horizon reference line
    ctx.strokeStyle = "#2a3247";
    ctx.lineWidth = 1.5 * dpr;
    ctx.setLineDash([5 * dpr, 5 * dpr]);
    ctx.beginPath();
    ctx.moveTo(x + w * 0.06, cy + u * 0.26);
    ctx.lineTo(x + w * 0.94, cy + u * 0.26);
    ctx.stroke();
    ctx.setLineDash([]);

    // rotated car
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(shown * Math.PI / 180);
    if (mode === "roll") carRear(ctx, u, color); else carSide(ctx, u, color);
    ctx.restore();

    // panel title (top-left) and degree readout (top-right)
    ctx.textBaseline = "top";
    ctx.textAlign = "left";
    ctx.fillStyle = "#c3cbdd";
    ctx.font = `700 ${16 * dpr}px -apple-system, sans-serif`;
    ctx.fillText(mode === "roll" ? "左右の傾き" : "前後の坂", x + 8 * dpr, y + 5 * dpr);

    let dirTxt;
    const a = Math.abs(deg);
    if (a < 0.5) dirTxt = "水平";
    else if (mode === "roll") dirTxt = (deg > 0 ? "右 " : "左 ") + a.toFixed(0) + "°";
    else dirTxt = (deg > 0 ? "上り " : "下り ") + a.toFixed(0) + "°";
    ctx.textAlign = "right";
    ctx.fillStyle = color;
    ctx.font = `bold ${17 * dpr}px -apple-system, sans-serif`;
    ctx.fillText(dirTxt, x + w - 8 * dpr, y + 4 * dpr);
  }

  function drawTilt() {
    const dpr = fitCanvas(tiltC);
    const ctx = tiltC.getContext("2d");
    const w = tiltC.width, h = tiltC.height;
    ctx.clearRect(0, 0, w, h);

    drawTiltHalf(ctx, dpr, 0, 0, w, h / 2, state.roll, "roll");
    // separator
    ctx.strokeStyle = "#2a3247";
    ctx.lineWidth = 1 * dpr;
    ctx.beginPath(); ctx.moveTo(w * 0.06, h / 2); ctx.lineTo(w * 0.94, h / 2); ctx.stroke();
    drawTiltHalf(ctx, dpr, 0, h / 2, w, h / 2, state.pitch, "pitch");
  }

  // ---- G ball ----
  const gTrail = [];
  function drawGBall() {
    const dpr = fitCanvas(gballC);
    const ctx = gballC.getContext("2d");
    const w = gballC.width, h = gballC.height;
    const scale = 1.0; // outer ring = 1.0 G

    ctx.clearRect(0, 0, w, h);

    const mag = Math.hypot(state.gx, state.gy);
    const color = mag > 0.8 ? "#f2545b" : mag > 0.4 ? "#f6c445" : "#33d17a";

    // big current-G number at top
    const numH = h * 0.22;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle = color;
    ctx.font = `bold ${Math.round(numH * 0.72)}px -apple-system, sans-serif`;
    ctx.fillText(mag.toFixed(2) + " G", w / 2, numH / 2 + 4 * dpr);

    // friction circle below the number
    const cx = w / 2;
    const cy = numH + (h - numH) / 2;
    const R = Math.min(w / 2, (h - numH) / 2) - 12 * dpr;

    // crosshair
    ctx.strokeStyle = "#232b3e";
    ctx.lineWidth = 1.5 * dpr;
    ctx.beginPath();
    ctx.moveTo(cx - R, cy); ctx.lineTo(cx + R, cy);
    ctx.moveTo(cx, cy - R); ctx.lineTo(cx, cy + R);
    ctx.stroke();

    // rings 0.5G / 1.0G with labels on the 45° diagonal
    ctx.font = `${11 * dpr}px -apple-system, sans-serif`;
    for (const g of [0.5, 1.0]) {
      const r = R * g / scale;
      ctx.strokeStyle = g === 1.0 ? "#3a4763" : "#2a3247";
      ctx.lineWidth = (g === 1.0 ? 2 : 1.5) * dpr;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
      ctx.fillStyle = "#8b94a8";
      ctx.fillText(g.toFixed(1) + "G", cx + r * 0.707, cy - r * 0.707 - 8 * dpr);
    }

    // direction labels: top = direction of travel
    ctx.font = `bold ${13 * dpr}px -apple-system, sans-serif`;
    ctx.fillStyle = "#8b94a8";
    ctx.fillText("前", cx, cy - R + 13 * dpr);
    ctx.fillText("後", cx, cy + R - 13 * dpr);

    // trail (last ~0.7s of movement, fading out)
    gTrail.push({ x: state.gx, y: state.gy });
    if (gTrail.length > 40) gTrail.shift();
    for (let i = 0; i < gTrail.length; i++) {
      let tx = gTrail[i].x / scale, ty = gTrail[i].y / scale;
      const tm = Math.hypot(tx, ty);
      if (tm > 1) { tx /= tm; ty /= tm; }
      ctx.fillStyle = `rgba(139,148,168,${((i + 1) / gTrail.length * 0.30).toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(cx + tx * R, cy + ty * R, 3.5 * dpr, 0, Math.PI * 2);
      ctx.fill();
    }

    // dot (clamped to outer ring) with glow and white border
    let gx = state.gx / scale, gy = state.gy / scale;
    const m = Math.hypot(gx, gy);
    if (m > 1) { gx /= m; gy /= m; }
    ctx.shadowColor = color;
    ctx.shadowBlur = 14 * dpr;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx + gx * R, cy + gy * R, 10 * dpr, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2.5 * dpr;
    ctx.stroke();
  }

  // ---- compass ----
  function drawCompass() {
    const dpr = fitCanvas(compassC);
    const ctx = compassC.getContext("2d");
    const w = compassC.width, h = compassC.height;
    const cx = w / 2, cy = h / 2 + 4 * dpr;
    const R = Math.min(w, h) / 2 - 8 * dpr;
    const hasHdg = state.heading !== null;
    const hdg = hasHdg ? state.heading : 0;

    ctx.clearRect(0, 0, w, h);

    // outer ring
    ctx.strokeStyle = "#2a3247";
    ctx.lineWidth = 2 * dpr;
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2); ctx.stroke();

    // rotating rose: ticks + cardinal letters (upright text)
    const CARD = [
      { d: 0,   t: "北", major: true },
      { d: 45,  t: "北東" },
      { d: 90,  t: "東", major: true },
      { d: 135, t: "南東" },
      { d: 180, t: "南", major: true },
      { d: 225, t: "南西" },
      { d: 270, t: "西", major: true },
      { d: 315, t: "北西" },
    ];
    // minor ticks every 15°
    for (let d = 0; d < 360; d += 15) {
      const a = (d - hdg) * Math.PI / 180;
      const s = Math.sin(a), c = -Math.cos(a);
      const r1 = R * (d % 45 === 0 ? 0.86 : 0.92);
      ctx.strokeStyle = d % 45 === 0 ? "#8b94a8" : "#2a3247";
      ctx.lineWidth = (d % 45 === 0 ? 2 : 1.5) * dpr;
      ctx.beginPath();
      ctx.moveTo(cx + s * r1, cy + c * r1);
      ctx.lineTo(cx + s * R * 0.97, cy + c * R * 0.97);
      ctx.stroke();
    }
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    for (const k of CARD) {
      const a = (k.d - hdg) * Math.PI / 180;
      const s = Math.sin(a), c = -Math.cos(a);
      const r = R * (k.major ? 0.68 : 0.70);
      if (k.major) {
        ctx.font = `bold ${Math.round(R * 0.24)}px -apple-system, sans-serif`;
        ctx.fillStyle = k.d === 0 ? "#f2545b" : "#e8ecf5";
      } else {
        ctx.font = `${Math.round(R * 0.13)}px -apple-system, sans-serif`;
        ctx.fillStyle = "#8b94a8";
      }
      ctx.fillText(k.t, cx + s * r, cy + c * r);
    }

    // fixed pointer at top = direction of travel
    ctx.fillStyle = "#f6c445";
    ctx.beginPath();
    ctx.moveTo(cx, cy - R + 4 * dpr);
    ctx.lineTo(cx - 7 * dpr, cy - R - 8 * dpr);
    ctx.lineTo(cx + 7 * dpr, cy - R - 8 * dpr);
    ctx.closePath();
    ctx.fill();

    // center readout
    ctx.fillStyle = hasHdg ? "#e8ecf5" : "#8b94a8";
    ctx.font = `bold ${Math.round(R * 0.30)}px -apple-system, sans-serif`;
    ctx.fillText(hasHdg ? Math.round(hdg) + "°" : "--", cx, cy - R * 0.10);
    ctx.font = `bold ${Math.round(R * 0.19)}px -apple-system, sans-serif`;
    ctx.fillStyle = hasHdg ? "#33d17a" : "#8b94a8";
    ctx.fillText(hasHdg ? DIRS[Math.round(hdg / 22.5) % 16] : "—", cx, cy + R * 0.16);
  }

  // ---- render loop ----
  function fmt(n, digits = 0) {
    return n === null || Number.isNaN(n) ? "--" : n.toFixed(digits);
  }

  function speedColor(v) {
    if (v === null || Number.isNaN(v)) return "#e8ecf5";
    return v >= 120 ? "#f2545b" : v >= 90 ? "#ff9838" : v >= 60 ? "#f6c445" : "#33d17a";
  }

  function altColor(a) {
    if (a === null || Number.isNaN(a)) return "#e8ecf5";
    if (a < 0) return "#4da3ff";
    return a >= 2000 ? "#f2545b" : a >= 1000 ? "#ff9838" : a >= 500 ? "#f6c445" : "#33d17a";
  }

  function render() {
    drawTilt();
    drawGBall();
    drawCompass();
    $("gMax").textContent = state.gMax.toFixed(2) + "G";
    $("speedVal").innerHTML = fmt(state.speed) + '<span class="unit">km/h</span>';
    $("speedVal").style.color = speedColor(state.speed);
    $("altVal").innerHTML = fmt(state.alt) + '<span class="unit">m</span>';
    $("altVal").style.color = altColor(state.alt);
    requestAnimationFrame(render);
  }

  // ---- wiring ----
  $("startBtn").addEventListener("click", async () => {
    errEl.textContent = "";
    try {
      await requestSensorPermission();
      startGeolocation();
      overlay.style.display = "none";
      statusEl.textContent = "sensors: active";
      statusEl.classList.add("ok");
      if (navigator.wakeLock) {
        navigator.wakeLock.request("screen").catch(() => {});
      }
      requestAnimationFrame(render);
    } catch (e) {
      errEl.textContent = e.message +
        "（Safariの設定 > プライバシー > モーションと画面の向きへのアクセス を確認してください）";
    }
  });

  $("calBtn").addEventListener("click", () => {
    state.rollZero = state.rollRaw;
    state.pitchZero = state.pitchRaw;
    state.gMax = 0;
  });
})();
</script>
</body>
</html>
